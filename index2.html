<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cajero Automático</title>

<style>
body {
    font-family: Arial;
    background: #0d1b2a;
    color: white;
    text-align: center;
}

.container {
    width: 350px;
    margin: 50px auto;
    background: #1b263b;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: none;
}

button {
    background: #00b4d8;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0096c7;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h2>CAJERO AUTOMÁTICO</h2>

<!-- INICIO -->
<div id="inicio">
    <h3>Seleccione modo de acceso</h3>
    <button onclick="modoAcceso('cedula')">Sin tarjeta (Cédula)</button>
    <button onclick="modoAcceso('tarjeta')">Con tarjeta</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">

    <div id="campoCedula" class="hidden">
        <input id="cedula" placeholder="Ingrese cédula">
    </div>

    <div id="campoTarjeta" class="hidden">
        <input id="tarjeta" placeholder="Inserte tarjeta">
    </div>

    <input id="pin" type="password" placeholder="Ingrese PIN">
    <button onclick="validar()">Ingresar</button>

    <p id="mensaje"></p>
</div>

<!-- MENÚ -->
<div id="menu" class="hidden">
    <h3>MENÚ PRINCIPAL</h3>

    <button onclick="consultarSaldo()">Consultar saldo</button>
    <button onclick="retirar()">Retirar dinero</button>
    <button onclick="depositar()">Depositar dinero</button>
    <button onclick="pagar()">Pagar servicios</button>
    <button onclick="cambiarClave()">Cambiar clave</button>
    <button onclick="salir()">Salir</button>

    <p id="resultado"></p>
</div>

</div>

<script>

// BASE DE DATOS SIMULADA (BANCO)
const banco = {
    "123": { pin: "1111", saldo: 500000, tarjeta: "9999" }
};

let modo = "";
let intentos = 0;
let usuarioActual = null;

// SELECCIÓN DE MODO
function modoAcceso(tipo){
    modo = tipo;
    document.getElementById("inicio").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");

    if(tipo === "cedula"){
        document.getElementById("campoCedula").classList.remove("hidden");
    } else {
        document.getElementById("campoTarjeta").classList.remove("hidden");
    }
}

// VALIDACIÓN
function validar(){

    let cedula = document.getElementById("cedula").value;
    let tarjeta = document.getElementById("tarjeta").value;
    let pin = document.getElementById("pin").value;

    // FILTRO 1: VALIDAR CLIENTE (BANCO)
    if(modo === "cedula"){
        if(!banco[cedula]){
            mostrar("Usted no es cliente. Diríjase a una oficina y abra una cuenta.");
            return;
        }
        usuarioActual = banco[cedula];
    }

    if(modo === "tarjeta"){
        let encontrado = Object.values(banco).find(u => u.tarjeta === tarjeta);

        if(!encontrado){
            mostrar("Tarjeta no válida.");
            return;
        }
        usuarioActual = encontrado;
    }

    // FILTRO 2: VALIDAR PIN
    if(pin === usuarioActual.pin){
        accesoCorrecto();
    } else {
        intentos++;
        mostrar("PIN incorrecto. Intento " + intentos);

        if(intentos >= 3){
            mostrar("Cuenta bloqueada por seguridad.");
            setTimeout(() => location.reload(), 2000);
        }
    }
}

// ACCESO CORRECTO
function accesoCorrecto(){
    intentos = 0;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

// MENSAJES
function mostrar(msg){
    document.getElementById("mensaje").innerText = msg;
}

// OPERACIONES
function consultarSaldo(){
    document.getElementById("resultado").innerText =
    "Saldo disponible: $" + usuarioActual.saldo;
}

function retirar(){
    let monto = prompt("Ingrese monto");
    if(monto > 0 && monto <= usuarioActual.saldo){
        usuarioActual.saldo -= monto;
        alert("Retiro exitoso");
    } else {
        alert("Saldo insuficiente");
    }
}

function depositar(){
    let monto = prompt("Ingrese monto");
    usuarioActual.saldo += Number(monto);
    alert("Depósito exitoso");
}

function pagar(){
    let monto = prompt("Valor a pagar");
    if(monto <= usuarioActual.saldo){
        usuarioActual.saldo -= monto;
        alert("Pago realizado");
    } else {
        alert("Saldo insuficiente");
    }
}

function cambiarClave(){
    let nueva = prompt("Nueva clave");
    usuarioActual.pin = nueva;
    alert("Clave actualizada");
}

function salir(){
    location.reload();
}

</script>

</body>
</html>
