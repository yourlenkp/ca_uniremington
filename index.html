<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cajero</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container" id="login">

    <!-- SIN TARJETA -->
    <div class="card">
        <h2>Sin Tarjeta</h2>
        <input id="cedula" placeholder="Cédula">
        <input id="pin1" type="password" placeholder="PIN">
        <input id="saldoInput" type="number" placeholder="Saldo inicial">
        
        <select id="tipoCuenta">
            <option value="">Tipo de cuenta</option>
            <option>Ahorro</option>
            <option>Corriente</option>
        </select>

        <input id="montoInput" type="number" placeholder="Monto a retirar">

        <select id="donacion">
            <option value="">¿Donar $1000?</option>
            <option value="si">Sí</option>
            <option value="no">No</option>
        </select>

        <button class="green" onclick="loginSinTarjeta()">INGRESAR</button>
    </div>

    <!-- CON TARJETA -->
    <div class="card">
        <h2>Con Tarjeta</h2>
        <p>Inserte su tarjeta</p>
        <input id="pin2" type="password" placeholder="PIN">
        <button class="blue" onclick="loginConTarjeta()">INGRESAR</button>
    </div>

</div>

<!-- MENÚ -->
<div id="menu">
    <div class="menu-box">
        <h2>Menú</h2>
        <button onclick="consultarSaldo()">Consultar saldo</button>
        <button onclick="retirar()">Retirar dinero</button>
        <button onclick="salir()">Salir</button>
        <div id="resultado"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
