<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cajero Automático</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container" id="login">

    <!-- SIN TARJETA -->
    <div class="card">
        <h2>Sin Tarjeta</h2>
        <input type="text" id="cedula" placeholder="Cédula">
        <input type="password" id="pin1" placeholder="PIN (4 dígitos)">
        <button class="green" onclick="loginSinTarjeta()">INGRESAR</button>
    </div>

    <!-- CON TARJETA -->
    <div class="card">
        <h2>Con Tarjeta</h2>
        <p>Inserte su tarjeta</p>
        <input type="password" id="pin2" placeholder="PIN (4 dígitos)">
        <button class="blue" onclick="loginConTarjeta()">INGRESAR</button>
    </div>

</div>

<!-- MENÚ -->
<div id="menu">
    <div class="menu-box">
        <h2>Menú Principal</h2>
        <button onclick="consultarSaldo()">Consultar saldo</button>
        <button onclick="retirar()">Retirar dinero</button>
        <button onclick="depositar()">Depositar dinero</button>
        <button onclick="pagar()">Pagar servicios</button>
        <button onclick="cambiarClave()">Cambiar clave</button>
        <button onclick="salir()">Salir</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
